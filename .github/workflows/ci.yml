name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      OAUTH_ENCRYPTION_KEY: "cw_0x689RpI-jtRR7oE8h_eQsKIMA5RoX2Ie3V-3_1o="
    timeout-minutes: 15

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Run import and app sanity check
        run: |
          python - <<'PY'
          from main import app
          routes = {route.path for route in app.routes if hasattr(route, 'path')}
          assert "/health" in routes
          assert "/" in routes
          print("App import and route check passed")
          PY

      - name: Compile Python files
        run: python -m compileall main.py config routes schemas services
      
      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Build Docker image
        run: docker build -t lanchain-projects:ci .

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Trigger Render deploy
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"